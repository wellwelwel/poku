name: '🎖️ CI — Benchmark'

on:
  pull_request:
    paths:
      - '.github/workflows/ci_benchmark.yml'
      - 'benchmark/**'
      - 'src/**'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  bench-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Test Runner
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: ➕ Actions — Setup Hyperfine
        run: cargo install --locked hyperfine

      - name: ➕ Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-linux-

      - name: ➕ Cache dependencies (Benchmark)
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-benchmark-${{ hashFiles('benchmark/package-lock.json') }}
          restore-keys: npm-benchmark-

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🚀 Building Poku
        run: |
          npm run build
          npm --prefix benchmark ci

      - name: 🎖️ Rock it
        run: cd benchmark && sh benchmark.sh execution | tee partial-execution.md

      - name: ➕ Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-execution
          retention-days: 1
          path: |
            benchmark/partial-execution.md
            benchmark/results/execution

  bench-assertions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Assertion
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: ➕ Actions — Setup Hyperfine
        run: cargo install --locked hyperfine

      - name: ➕ Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-linux-

      - name: ➕ Cache dependencies (Benchmark)
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-benchmark-${{ hashFiles('benchmark/package-lock.json') }}
          restore-keys: npm-benchmark-

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🚀 Building Poku
        run: |
          npm run build
          npm --prefix benchmark ci

      - name: 🎖️ Rock it
        run: cd benchmark && sh benchmark.sh assertions | tee partial-assertions.md

      - name: ➕ Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-assertions
          retention-days: 1
          path: |
            benchmark/partial-assertions.md
            benchmark/results/assertions

  compare:
    needs: [bench-execution, bench-assertions]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: Compare
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v6

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: ➕ Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bench-*
          merge-multiple: true
          path: benchmark

      - name: 📝 Assemble output
        run: |
          { printf "# 🎖️ Benchmarks\n\n"; cat benchmark/partial-execution.md; cat benchmark/partial-assertions.md; } > benchmark/output.md

      - name: 📊 Compare
        run: cd benchmark && node comparison.js

      - name: 💬 Comment
        uses: wellwelwel/bot@v1.0.0
        with:
          update-if-includes: 'Benchmarks'
          comment-from-file: './benchmark/output.md'
